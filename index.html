<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站 | 新闻简报 & 播客精选 & AI跟踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 20px; color: white; }
        .avatar {
            width: 120px; height: 120px; border-radius: 50%; background: white;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 48px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        nav {
            background: white; border-radius: 12px; padding: 15px;
            margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        nav a {
            text-decoration: none; color: #667eea; font-weight: 600;
            padding: 10px 20px; border-radius: 8px; transition: all 0.3s; cursor: pointer;
        }
        nav a:hover, nav a.active { background: #667eea; color: white; }
        .content {
            background: white; border-radius: 16px; padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section-title {
            font-size: 1.5em; color: #667eea; margin-bottom: 15px;
            padding-bottom: 10px; border-bottom: 3px solid #667eea;
        }
        
        /* 新闻样式 */
        .news-item {
            padding: 12px; margin-bottom: 12px; background: #f8f9fa;
            border-radius: 8px; border-left: 4px solid #667eea;
        }
        .news-item h3 { margin-bottom: 5px; }
        .news-item a { color: #667eea; text-decoration: none; }
        .news-item a:hover { text-decoration: underline; }
        .news-desc { color: #666; font-size: 0.9em; line-height: 1.5; }
        
        /* 播客样式 */
        .podcast-card {
            background: #f8f9fa; border-radius: 12px; margin-bottom: 15px;
            overflow: hidden; border: 1px solid #e9ecef;
        }
        .podcast-card-header {
            background: white; padding: 12px 15px; border-bottom: 1px solid #e9ecef;
        }
        .podcast-card-header h3 { font-size: 1em; color: #333; margin-bottom: 3px; }
        .podcast-card-header .host { font-size: 0.8em; color: #666; }
        .episode-content { padding: 15px; }
        .episode-title { font-size: 0.95em; margin-bottom: 8px; }
        .episode-title a { color: #333; text-decoration: none; }
        .episode-title a:hover { color: #667eea; }
        .episode-summary {
            background: white; padding: 12px; border-radius: 6px;
            font-size: 0.85em; color: #555; line-height: 1.6;
            border-left: 3px solid #667eea;
        }
        .episode-meta { margin-top: 8px; font-size: 0.8em; color: #888; }
        
        /* AI跟踪样式 */
        .ai-category {
            margin-bottom: 20px;
            border-left: 4px solid #9b59b6;
            padding-left: 15px;
        }
        .ai-category-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .ai-category-header h3 { font-size: 1.1em; color: #9b59b6; }
        .ai-item {
            padding: 12px; margin-bottom: 10px; background: #fafafa;
            border-radius: 8px;
        }
        .ai-item h4 { font-size: 0.95em; margin-bottom: 5px; }
        .ai-item h4 a { color: #333; text-decoration: none; }
        .ai-item h4 a:hover { color: #9b59b6; }
        .ai-item .summary {
            font-size: 0.85em; color: #555; line-height: 1.5;
            margin-top: 5px;
        }
        .ai-item .meta { font-size: 0.75em; color: #888; margin-top: 5px; }
        
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px; margin: 15px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px; border-radius: 10px; text-align: center;
        }
        .stat-card h3 { font-size: 1.8em; margin-bottom: 3px; }
        .stat-card p { opacity: 0.9; font-size: 0.85em; }
        
        footer { text-align: center; padding: 20px; color: white; opacity: 0.8; }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-size: 0.95em; margin-bottom: 15px;
        }
        .refresh-btn:hover { opacity: 0.9; }
        .loading { text-align: center; padding: 30px; color: #888; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #667eea;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            nav ul { flex-direction: column; gap: 8px; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar" style="background:none;box-shadow:none;"><img src="avatar.jpg" alt="Logo" style="width:120px;height:120px;border-radius:50%;box-shadow:0 10px 30px rgba(0,0,0,0.2);"></div>
            <h1>我的个人网站</h1>
            <p class="subtitle">新闻简报 | 播客精选 | AI跟踪</p>
        </header>

        <nav>
            <ul>
                <li><a class="active" onclick="showTab('news')">📰 新闻</a></li>
                <li><a onclick="showTab('podcasts')">🎙️ 播客</a></li>
                <li><a onclick="showTab('ai')">🤖 AI跟踪</a></li>
            </ul>
        </nav>

        <div id="newsTab" class="tab-content active">
            <main class="content">
                <button class="refresh-btn" onclick="loadNews()">🔄 刷新</button>
                <div class="stats">
                    <div class="stat-card"><h3 id="newsCount">0</h3><p>新闻</p></div>
                    <div class="stat-card"><h3 id="sourcesCount">0</h3><p>来源</p></div>
                    <div class="stat-card"><h3 id="updateTime">--</h3><p>更新</p></div>
                </div>
                <div id="newsLoading" class="loading"><div class="spinner"></div><p>加载中...</p></div>
                <div id="newsContent"></div>
            </main>
        </div>

        <div id="podcastsTab" class="tab-content">
            <main class="content">
                <button class="refresh-btn" onclick="loadPodcasts()">🔄 刷新</button>
                <div class="stats">
                    <div class="stat-card"><h3 id="podcastCount">0</h3><p>播客</p></div>
                    <div class="stat-card"><h3 id="episodeCount">0</h3><p>单集</p></div>
                    <div class="stat-card"><h3 id="podcastUpdateTime">--</h3><p>更新</p></div>
                </div>
                <div id="podcastLoading" class="loading"><div class="spinner"></div><p>加载中...</p></div>
                <div id="podcastContent"></div>
            </main>
        </div>

        <div id="aiTab" class="tab-content">
            <main class="content">
                <button class="refresh-btn" onclick="loadAI()">🔄 刷新</button>
                <div class="stats">
                    <div class="stat-card"><h3 id="aiCount">0</h3><p>资讯</p></div>
                    <div class="stat-card"><h3 id="aiCatCount">0</h3><p>分类</p></div>
                    <div class="stat-card"><h3 id="aiUpdateTime">--</h3><p>更新</p></div>
                </div>
                <div id="aiLoading" class="loading"><div class="spinner"></div><p>加载中...</p></div>
                <div id="aiContent"></div>
            </main>
        </div>

        <footer>
            <p>OpenClaw 自动生成 | AI 中文总结</p>
            <p>© 2026</p>
        </footer>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
            if (tab === 'news') loadNews();
            if (tab === 'podcasts') loadPodcasts();
            if (tab === 'ai') loadAI();
        }

        async function loadNews() {
            const loading = document.getElementById('newsLoading');
            const content = document.getElementById('newsContent');
            loading.style.display = 'block'; content.innerHTML = '';
            try {
                const res = await fetch('news-data.json');
                const data = await res.json();
                displayNews(data);
            } catch { content.innerHTML = '<p style="text-align:center;color:#888;">暂无数据</p>'; }
            loading.style.display = 'none';
        }

        function displayNews(data) {
            const content = document.getElementById('newsContent');
            document.getElementById('newsCount').textContent = data.stats?.total || 0;
            document.getElementById('sourcesCount').textContent = data.stats?.sources || 0;
            document.getElementById('updateTime').textContent = data.stats?.updateTime || '--';
            let html = '';
            for (const cat of data.categories || []) {
                html += `<h2 class="section-title">${cat.icon || ''} ${cat.name}</h2>`;
                for (const src of cat.sources || []) {
                    for (const item of src.items || []) {
                        html += `<div class="news-item"><h3><a href="${item.link}" target="_blank">${item.title}</a></h3><p class="news-desc">${item.desc || ''}</p></div>`;
                    }
                }
            }
            content.innerHTML = html || '<p style="text-align:center;color:#888;">暂无新闻</p>';
        }

        async function loadPodcasts() {
            const loading = document.getElementById('podcastLoading');
            const content = document.getElementById('podcastContent');
            loading.style.display = 'block'; content.innerHTML = '';
            try {
                const res = await fetch('podcast-data.json');
                const data = await res.json();
                displayPodcasts(data);
            } catch { content.innerHTML = '<p style="text-align:center;color:#888;">暂无数据</p>'; }
            loading.style.display = 'none';
        }

        function displayPodcasts(data) {
            const content = document.getElementById('podcastContent');
            document.getElementById('podcastCount').textContent = data.stats?.totalPodcasts || 0;
            document.getElementById('episodeCount').textContent = data.stats?.totalEpisodes || 0;
            document.getElementById('podcastUpdateTime').textContent = data.date || '--';
            let html = '<h2 class="section-title">🎙️ 播客精选</h2>';
            for (const cat of data.categories || []) {
                html += `<div style="margin:15px 0;padding:10px;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);border-radius:8px;color:white;"><h3>${cat.icon} ${cat.name}</h3></div>`;
                for (const pod of cat.podcasts || []) {
                    for (const ep of pod.episodes || []) {
                        html += `<div class="podcast-card">
                            <div class="podcast-card-header"><h3>${pod.name_cn || pod.name}</h3><div class="host">🎤 ${pod.host}</div></div>
                            <div class="episode-content">
                                <div class="episode-title"><a href="${ep.link}" target="_blank">${ep.title}</a></div>
                                <div class="episode-summary">${ep.summary || ''}</div>
                                <div class="episode-meta">${ep.pubDateFormatted || ''}</div>
                            </div></div>`;
                    }
                }
            }
            content.innerHTML = html || '<p style="text-align:center;color:#888;">暂无播客</p>';
        }

        async function loadAI() {
            const loading = document.getElementById('aiLoading');
            const content = document.getElementById('aiContent');
            loading.style.display = 'block'; content.innerHTML = '';
            try {
                const res = await fetch('ai-tracker-data.json');
                const data = await res.json();
                displayAI(data);
            } catch { content.innerHTML = '<p style="text-align:center;color:#888;">暂无数据</p>'; }
            loading.style.display = 'none';
        }

        function displayAI(data) {
            const content = document.getElementById('aiContent');
            document.getElementById('aiCount').textContent = data.totalItems || 0;
            document.getElementById('aiCatCount').textContent = data.categories?.length || 0;
            document.getElementById('aiUpdateTime').textContent = data.date || '--';
            let html = '<h2 class="section-title">🤖 大模型进展跟踪</h2>';
            for (const cat of data.categories || []) {
                html += `<div class="ai-category">
                    <div class="ai-category-header"><span style="font-size:1.3em">${cat.icon}</span><h3>${cat.name}</h3></div>`;
                for (const item of cat.items || []) {
                    const hasLink = item.link && item.link.startsWith('http');
                    html += `<div class="ai-item">
                        <h4>${hasLink ? `<a href="${item.link}" target="_blank">${item.title}</a>` : item.title}</h4>
                        <div class="summary">${item.summary || ''}</div>
                        <div class="meta">${item.source || ''} ${item.pubDateFormatted || ''}</div>
                    </div>`;
                }
                html += '</div>';
            }
            content.innerHTML = html || '<p style="text-align:center;color:#888;">暂无数据</p>';
        }

        loadNews();
    </script>
</body>
</html>
