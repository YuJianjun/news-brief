<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站 | 新闻简报 & 播客精选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        nav {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        nav a:hover, nav a.active {
            background: #667eea;
            color: white;
        }

        .content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        /* Tab 切换 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 新闻样式 */
        .news-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .news-item:hover {
            transform: translateX(5px);
        }

        .news-item h3 {
            margin-bottom: 8px;
            color: #333;
        }

        .news-item a {
            color: #667eea;
            text-decoration: none;
        }

        .news-item a:hover {
            text-decoration: underline;
        }

        .news-desc {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        /* 播客分类 */
        .podcast-category {
            margin-bottom: 30px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
        }

        .category-header.top-tech {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .category-header.vc-startup {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .category-header.other-tech {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
        }

        .category-header h2 {
            font-size: 1.4em;
        }

        .category-header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        /* 播客卡片 */
        .podcast-card {
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #e9ecef;
        }

        .podcast-card-header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .podcast-card-header h3 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        .podcast-card-header .host {
            font-size: 0.85em;
            color: #666;
        }

        .podcast-card-header .platforms {
            margin-top: 8px;
        }

        .platform-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #e9ecef;
            color: #666;
            border-radius: 4px;
            font-size: 0.75em;
            margin-right: 5px;
        }

        .episode-content {
            padding: 20px;
        }

        .episode-title {
            font-size: 1em;
            color: #333;
            margin-bottom: 10px;
        }

        .episode-title a {
            color: #333;
            text-decoration: none;
        }

        .episode-title a:hover {
            color: #667eea;
        }

        .episode-summary {
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #555;
            line-height: 1.7;
            border-left: 3px solid #667eea;
        }

        .episode-meta {
            margin-top: 12px;
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
        }

        .episode-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        #loading, #podcastLoading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            nav ul { flex-direction: column; gap: 10px; align-items: center; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">🎙️</div>
            <h1>我的个人网站</h1>
            <p class="subtitle">每日新闻简报 | 科技播客精选</p>
        </header>

        <nav>
            <ul>
                <li><a class="active" onclick="showTab('news')">📰 新闻简报</a></li>
                <li><a onclick="showTab('podcasts')">🎙️ 播客精选</a></li>
            </ul>
        </nav>

        <!-- 新闻简报 Tab -->
        <div id="newsTab" class="tab-content active">
            <main class="content">
                <button class="refresh-btn" onclick="loadNews()">🔄 刷新新闻</button>
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="newsCount">0</h3>
                        <p>新闻总数</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="sourcesCount">0</h3>
                        <p>新闻来源</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="updateTime">--</h3>
                        <p>更新时间</p>
                    </div>
                </div>
                <div id="loading"><div class="spinner"></div><p>正在加载新闻...</p></div>
                <div id="newsContent"></div>
            </main>
        </div>

        <!-- 播客精选 Tab -->
        <div id="podcastsTab" class="tab-content">
            <main class="content">
                <button class="refresh-btn" onclick="loadPodcasts()">🔄 刷新播客</button>
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="podcastCount">0</h3>
                        <p>播客节目</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="episodeCount">0</h3>
                        <p>最新单集</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="podcastUpdateTime">--</h3>
                        <p>更新时间</p>
                    </div>
                </div>
                <div id="podcastLoading"><div class="spinner"></div><p>正在加载播客...</p></div>
                <div id="podcastContent"></div>
            </main>
        </div>

        <footer>
            <p>由 OpenClaw 自动生成 | AI 中文总结</p>
            <p>© 2026 我的个人网站</p>
        </footer>
    </div>

    <script>
        // Tab 切换
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
            if (tab === 'news') loadNews();
            if (tab === 'podcasts') loadPodcasts();
        }

        // 加载新闻
        async function loadNews() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('newsContent');
            loading.style.display = 'block';
            content.innerHTML = '';
            try {
                const response = await fetch('news-data.json');
                const data = await response.json();
                displayNews(data);
            } catch (error) {
                content.innerHTML = '<p style="text-align:center;color:#888;">暂无新闻数据</p>';
            }
            loading.style.display = 'none';
        }

        function displayNews(data) {
            const content = document.getElementById('newsContent');
            const stats = data.stats || {};
            document.getElementById('newsCount').textContent = stats.total || 0;
            document.getElementById('sourcesCount').textContent = stats.sources || 0;
            document.getElementById('updateTime').textContent = stats.updateTime || '--';
            let html = '';
            for (const category of data.categories || []) {
                html += `<h2 class="section-title">${category.icon || ''} ${category.name}</h2>`;
                for (const source of category.sources || []) {
                    for (const item of source.items || []) {
                        html += `<div class="news-item">
                            <span class="news-meta">${source.name}</span>
                            <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
                            <p class="news-desc">${item.desc || ''}</p>
                        </div>`;
                    }
                }
            }
            content.innerHTML = html || '<p style="text-align:center;color:#888;">暂无新闻</p>';
        }

        // 加载播客
        async function loadPodcasts() {
            const loading = document.getElementById('podcastLoading');
            const content = document.getElementById('podcastContent');
            loading.style.display = 'block';
            content.innerHTML = '';
            try {
                const response = await fetch('podcast-data.json');
                const data = await response.json();
                displayPodcasts(data);
            } catch (error) {
                content.innerHTML = '<p style="text-align:center;color:#888;">暂无播客数据</p>';
            }
            loading.style.display = 'none';
        }

        function displayPodcasts(data) {
            const content = document.getElementById('podcastContent');
            const stats = data.stats || {};
            document.getElementById('podcastCount').textContent = stats.totalPodcasts || 0;
            document.getElementById('episodeCount').textContent = stats.totalEpisodes || 0;
            document.getElementById('podcastUpdateTime').textContent = data.date || '--';

            let html = '';
            for (const category of data.categories || []) {
                const catClass = category.key === 'top-tech' ? 'top-tech' : 
                                 category.key === 'vc-startup' ? 'vc-startup' : 'other-tech';
                
                html += `<div class="podcast-category">
                    <div class="category-header ${catClass}">
                        <span style="font-size:1.5em">${category.icon}</span>
                        <div>
                            <h2>${category.name}</h2>
                        </div>
                    </div>`;

                for (const podcast of category.podcasts || []) {
                    for (const ep of podcast.episodes || []) {
                        const hasLink = ep.link && (ep.link.startsWith('http') || ep.link.startsWith('https'));
                        html += `<div class="podcast-card">
                            <div class="podcast-card-header">
                                <h3>${podcast.name_cn || podcast.name}</h3>
                                <div class="host">🎤 ${podcast.host}</div>
                                <div class="platforms">
                                    ${(podcast.platforms || []).map(p => `<span class="platform-tag">${p}</span>`).join('')}
                                </div>
                            </div>
                            <div class="episode-content">
                                <div class="episode-title">
                                    ${hasLink ? `<a href="${ep.link}" target="_blank">${ep.title}</a>` : ep.title}
                                </div>
                                <div class="episode-summary">
                                    <p>${ep.summary || '暂无摘要'}</p>
                                </div>
                                <div class="episode-meta">
                                    ${ep.pubDateFormatted ? `<span>📅 ${ep.pubDateFormatted}</span>` : ''}
                                    ${ep.duration && ep.duration !== '0:00' ? `<span>⏱️ ${ep.duration}</span>` : ''}
                                </div>
                            </div>
                        </div>`;
                    }
                }
                html += `</div>`;
            }

            content.innerHTML = html || '<p style="text-align:center;color:#888;">暂无播客</p>';
        }

        // 页面加载
        loadNews();
    </script>
</body>
</html>
